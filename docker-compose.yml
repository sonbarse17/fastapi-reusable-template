version: "3.8"

services:
  # The FastAPI core service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_starter_api
    ports:
      - "8000:8000"
    volumes:
      # Mount the current directory into the container for live reload
      - .:/app
    environment:
      # Pass through the environment variable loaded from settings configs
      - ENVIRONMENT=development
      - DEBUG=True
    env_file:
      - .env

